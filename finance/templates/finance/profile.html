{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="mb-4">Profil Bilgileri</h3>
                <div class="alert alert-warning">
    Harcama analizi yapabilmek için aylık gelir ve haftalık çalışma saati bilgilerini doldurmalısın.
</div>

                <form method="post">

            </div>
        </div>
    </div>
</div>
{% endblock %}
