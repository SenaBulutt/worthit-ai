{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="mb-4">Giriş Yap</h3>

                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button class="btn btn-dark w-100">Giriş Yap</button>
                </form>

                <p class="mt-3">
                    Hesabın yok mu?
                    <a href="{% url 'register' %}">Kayıt ol</a>
                </p>
                <p>
    <a href="{% url 'password_reset' %}">
        Şifremi Unuttum
    </a>
</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
