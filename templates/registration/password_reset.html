{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow">
            <div class="card-body">

                <h3 class="mb-4">
                    Şifre Sıfırla
                </h3>

                <p class="text-muted">
                    Hesabınıza ait bilgileri girin.
                </p>

                <input type="text"
       placeholder="Kullanıcı adı"
       style="
       width: 100%;
       padding: 13px 15px;
       border-radius: 16px;
       border: 1px solid rgba(148, 163, 184, 0.18);
       background: rgba(15, 23, 42, 0.9);
       color: #e5e7eb;
       margin-top: 4px;
       margin-bottom: 18px;
">

                <label class="mb-2">
                    E-posta
                </label>

                {{ form.email }}

                <a href="{% url 'verify_code' %}"
                   class="btn btn-dark w-100 mt-3">
                    Şifre Sıfırlama Kodu Gönder
                </a>

            </div>
        </div>

    </div>
</div>

{% endblock %}
