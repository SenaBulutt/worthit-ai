{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">


    <div class="card shadow">
        <div class="card-body p-5">

            <h1 class="mb-4">
                Şifre Sıfırla
            </h1>

            <p class="text-muted mb-4">
                Hesabınıza kayıtlı kullanıcı adı ve e-posta adresinizi girin.
            </p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <label class="mb-2">
                    Kullanıcı Adı
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Kullanıcı adınız"
                    required
                >

                <label class="mb-2">
                    E-posta
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="E-posta adresiniz"
                    required
                >

                <button
                    type="submit"
                    class="btn btn-dark w-100 mt-3"
                >
                    Şifre Sıfırlama Kodu Gönder
                </button>

            </form>

        </div>
    </div>

</div>


</div>

{% endblock %}
