{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">

        <div class="card shadow">
            <div class="card-body">

                <h3 class="mb-4">Yeni Şifre Oluştur</h3>

                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-danger">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <form method="post">
                    {% csrf_token %}

                    <input
                        type="password"
                        name="password1"
                        class="form-control mb-3"
                        placeholder="Yeni şifre"
                        required
                    >

                    <input
                        type="password"
                        name="password2"
                        class="form-control mb-3"
                        placeholder="Yeni şifre tekrar"
                        required
                    >

                    <button type="submit" class="btn btn-dark w-100">
                        Şifreyi Güncelle
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
